<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Assignment 2: Scorpion</title>
    <link rel="stylesheet" href="asgn2.css">
</head>
<body onload="main()">
    <h1>Assignment 2: 3D Scorpion</h1>
    <div class="main-container">
        <!-- Top: Canvas and Stats -->
        <canvas id="webgl" width="700" height="700"></canvas>
        <p id="perf">FPS: 0</p>
        <!-- Bottom: Controls Area -->
        <div class="controls">
            <section>
                <span class="label-title">Arm & Pincer Joints</span>
                <div class="control-row">
                    <span>Arm Base</span>
                    <input type="range" id="armBase" min="-45" max="45" value="0" />
                </div>
                <div class="control-row">
                    <span>Arm Elbow</span>
                    <input type="range" id="armElbow" min="-30" max="30" value="0" />
                </div>
                <div class="control-row">
                    <span>Pincer Snap</span>
                    <input type="range" id="pincer" min="-15" max="15" value="0" />
                </div>
            </section>
            <section>
                <span class="label-title">Tail & Body Joints</span>
                <div class="control-row">
                    <span>Tail Base</span>
                    <input type="range" id="tail1" min="-45" max="0" value="0" />
                </div>
                <div class="control-row">
                    <span>Tail Tip</span>
                    <input type="range" id="tail2" min="-30" max="15" value="0" />
                </div>
            </section>
            <section>
                <span class="label-title">Animation Controls</span>
                <div class="button-row">
                    <button id="animOn" class="active-btn">Animation ON</button>
                    <button id="animOff">Animation OFF</button>
                </div>
            </section>
            <section>
                <span class="label-title">Camera & View</span>
                <div class="control-row">
                    <span>Zoom</span>
                    <input type="range" id="zoomSlider" min="10" max="200" value="100" />
                </div>
                <div class="control-row">
                    <span>Rotation</span>
                    <input type="range" id="angleSlider" min="0" max="360" value="35" />
                </div>
            </section>
            <div class="tip">
                <b>Drag Mouse</b> to rotate view &bull; <b>Mouse Wheel</b> to zoom in/out &bull; <b>Shift + Click</b> to trigger Strike animation
            </div>
            <hr class="card-divider">
            <!-- Navigation outside the info-card -->
            <div class="home-link-container">
                <a href="../../index.html" class="home-link">&larr; Back to Portfolio Home</a>
            </div>
        </div>
    </div>
    <!-- Scripts -->
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/cuon-matrix-cse160.js"></script>
    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="Cube.js"></script>
    <script src="Pyramid.js"></script>
    <script src="asgn2.js"></script>
</body>
</html>
